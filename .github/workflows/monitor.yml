name: HANA resale monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium

      - name: Monitor loop
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          for i in $(seq 1 17); do
            echo "=== check $i ==="
            node check.js || echo "check failed"
            git add state.json 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "update state" && git push || true
            fi
            if [ "$i" -lt 17 ]; then sleep 180; fi
          done
